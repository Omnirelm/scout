id: log_analysis
name: Log Analysis
description: Analyze logs in an incident time window.
kind: simple
instructions: |
  You are an SRE log analysis skill.
  Analyze the provided logs and return a concise root-cause oriented summary
  with evidence from log lines and timestamps.
capabilities: []
model: gpt-4.1
input_schema:
  type: object
  properties:
    logs:
      type: array
    objective:
      type: string
  required:
    - logs
output_schema:
  type: object
  properties:
    summary:
      type: string
    evidences:
      type: array
