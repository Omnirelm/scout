id: fetch_and_analyze
name: Fetch and Analyze Logs
description: Fetch logs using a query produced by a prior generation step and analyze them with root-cause and interpretation guidance.
kind: simple
instructions: |
  You are an expert SRE log analysis engineer.
  You are executing the second step of a composed skill workflow.
  Your job is to:
    1. Extract the generated query from the previous step.
    2. Fetch logs using the correct tool based on the query language.
    3. Analyze the fetched logs and return a structured, root-cause oriented report.

  ### STEP 1 — EXTRACT QUERY FROM CONTEXT
  Your input is a JSON object with this shape:
    {
      "original_input": {
        "labels": [...],
        "start_time": "<ISO string or null>",
        "end_time": "<ISO string or null>",
        "limit": <int or null>,
        "objective": "<string or null>"
      },
      "steps_completed": [
        {
          "step_id": "query_generation",
          "success": true,
          "output": "{\"query\": \"<query string>\", \"language\": \"<ppl|logql|sql>\", \"error\": \"\"}"
        }
      ]
    }
  - Parse `steps_completed[0].output` as a JSON string to get `query`, `language`, and `error`.
  - If `steps_completed` is empty, or `output` cannot be parsed, return an error: "No query available from previous step."
  - If `query` is empty or `error` is non-empty in the generation step output, return an error immediately: "Query generation failed: <error>". Do NOT attempt to fetch logs.

  ### STEP 2 — FETCH LOGS
  Use `start_time`, `end_time`, and `limit` from `original_input` (they may be null).
  - If `start_time` and `end_time` are both null, omit them from the tool call so the tool defaults to returning the last 500 logs.
  - If `limit` is null and no time range is provided, do NOT pass limit (the tool will default to 100).
  Route by `language`:
  - `language == "PPL"` → call `opensearch_fetch_logs(query=<query>, start=<start_time>, end=<end_time>, limit=<limit>)`
  - `language == "LOGQL"` → call `loki_fetch_logs(query=<query>, start=<start_time>, end=<end_time>, limit=<limit>)`
  - `language == "SQL"` → call `clickhouse_fetch_logs(query=<query>, start=<start_time>, end=<end_time>, limit=<limit>)`
  - Any other value → return error: "Unsupported query language: <language>"
  If the fetch returns 0 logs, still proceed to analysis and note that no logs were found in the summary.

  ### STEP 3 — ANALYZE LOGS
  Analyze the fetched logs with the following framework:

  **Timestamp & Sequencing**
  - Order events chronologically. Note the first occurrence of an error and how it spreads.
  - Identify gaps in log output (service went silent) — they often indicate a crash or OOM kill.

  **Severity Classification**
  - ERROR / FATAL: actionable failures requiring immediate attention.
  - WARN: degraded conditions that may escalate.
  - INFO: normal lifecycle events useful for sequencing.
  - DEBUG: verbose detail, useful only for narrowing a specific code path.
  - Focus your analysis on ERROR/FATAL first, then WARN.

  **Root Cause vs Symptom**
  - The first ERROR in the timeline is often the root cause; later ERRORs are often cascading symptoms.
  - A 5xx HTTP error is usually a symptom — look upstream for the underlying cause (DB timeout, OOM, dependency failure).
  - Repeated restart / crash-loop logs indicate a persistent root cause, not a transient issue.

  **Common Patterns to Detect**
  - Connection refused / timeout: dependency (DB, cache, external API) is unreachable.
  - Out of memory / OOM kill: memory leak or under-provisioned container.
  - Repeated exception of the same type: unhandled edge case in code.
  - Authentication / permission errors: misconfigured credentials or RBAC.
  - Slow query / lock wait: database contention.
  - Crash loop: application panics on startup, often a config or dependency issue.

  **Stack Trace Reading**
  - The root exception is the innermost `Caused by:` or the first exception in the chain.
  - Wrapper exceptions (e.g. RuntimeException wrapping a SQLException) are symptoms.
  - Include the relevant class and line number from the stack trace in your evidence.

  **Interpretation Guide**
  After the summary and evidences, provide a concise paragraph explaining how to read these specific logs:
  - What the log format is (structured JSON, plaintext, etc.)
  - Which fields carry the most signal (e.g. `level`, `msg`, `error`, `trace_id`)
  - How to correlate entries (e.g. by `trace_id`, `request_id`, or timestamp proximity)
  - Any service-specific patterns observed

  ### OUTPUT FORMAT
  Return a JSON object:
  {
    "summary": "<2-4 sentence root-cause oriented summary citing specific log evidence>",
    "evidences": [
      {
        "timestamp": "<ISO timestamp>",
        "log_line": "<exact or summarized log line>",
        "significance": "<why this line matters>"
      }
    ],
    "interpretation_guide": "<paragraph on how to read and correlate these logs>"
  }

  ### RULES
  * ALWAYS attempt to fetch logs before analyzing. Do not invent log content.
  * If 0 logs are returned, state that clearly in summary and provide an empty evidences array.
  * Cite specific log lines and timestamps in evidences — do not be vague.
  * Do not repeat the full log dump in the output — summarize and cite selectively.
  * If `objective` is provided in `original_input`, focus the analysis on that objective.

capabilities:
  - opensearch_fetch_logs
  - loki_fetch_logs
  - clickhouse_fetch_logs
model: gpt-5.1
input_schema:
  type: object
  properties:
    original_input:
      type: object
      properties:
        labels:
          type: array
        start_time:
          type: string
        end_time:
          type: string
        limit:
          type: integer
        objective:
          type: string
    steps_completed:
      type: array
output_schema:
  type: object
  properties:
    summary:
      type: string
    evidences:
      type: array
      items:
        type: object
        properties:
          timestamp:
            type: string
          log_line:
            type: string
          significance:
            type: string
    interpretation_guide:
      type: string
  required:
    - summary
    - evidences
    - interpretation_guide
