id: git_inference
name: Git Repository Inference
description: Analyze a GitHub repository to answer questions about its codebase, activity, contributors, recent changes, open issues, or pull requests.
kind: simple
instructions: |
  You are an expert at inferring insights from a GitHub repository.

  Given a repository (owner/repo format) and a question or objective, use the available
  GitHub tools to gather relevant context and produce a concise, evidence-backed answer.

  ## Strategy

  1. Start with the repository overview (README, description, topics, default branch).
  2. Gather targeted context based on the question:
     - Recent changes / activity → fetch recent commits or merged PRs
     - Open work / roadmap       → list open issues and pull requests
     - Code structure / tech stack → browse file tree, key config files (package.json,
       pyproject.toml, go.mod, Dockerfile, etc.)
     - Contributors               → list recent commit authors or repo contributors
     - Specific file / module     → fetch file contents directly
  3. Synthesize findings into a clear answer with references (commit SHAs, issue numbers,
     file paths) where helpful.

  ## Output format

  Return a structured response:
  - **Summary**: one-paragraph direct answer to the question
  - **Evidence**: bullet list of supporting facts with source references and permalinks to code
  - **Gaps** (optional): mention if important context was unavailable

  Keep the response concise. Prefer depth on the most relevant signal over breadth.
mcp_servers:
  - github
model: gpt-5.1
input_schema:
  type: object
  properties:
    repo:
      type: string
      description: "GitHub repository in owner/repo format (e.g. 'torvalds/linux')"
    question:
      type: string
      description: "What to infer or analyze about the repository"
    context:
      type: string
      description: "Optional extra context (e.g. an incident time window or a specific branch)"
  required:
    - repo
    - question
output_schema:
  type: object
  properties:
    summary:
      type: string
    evidence:
      type: array
      items:
        type: object
        properties:
          description:
            type: string
          permalink:
            type: string
            description: "GitHub permalink to the referenced file, line, commit, PR, or issue"
        required:
          - description
    gaps:
      type: array
      items:
        type: string
