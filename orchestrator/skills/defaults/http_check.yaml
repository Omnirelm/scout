id: http_check
name: HTTP Check
description: Perform a basic HTTP health check for a service endpoint.
kind: simple
instructions: |
  You are an SRE health-check skill.
  Call the service endpoint and report the status code, timing, and any error.
capabilities:
  - http_request
model: gpt-4.1
input_schema:
  type: object
  properties:
    url:
      type: string
    method:
      type: string
    timeout_ms:
      type: integer
  required:
    - url
output_schema:
  type: object
  properties:
    status_code:
      type: integer
    ok:
      type: boolean
    error:
      type: string
