id: ppl_log_analysis
name: PPL Log Analysis
description: Generate a PPL query for a service, fetch logs from OpenSearch, and produce a root-cause analysis with log interpretation guidance.
kind: composed
model: gpt-4.1
steps:
  - id: query_generation
    type: invoke_skill
    skill_id: ppl_generation
    objective: Generate a PPL query scoped to the target service using the provided labels and time window.

  - id: fetch_and_analyze
    type: invoke_skill
    skill_id: fetch_and_analyze
    objective: Fetch logs from OpenSearch using the generated PPL query and produce a root-cause analysis with log interpretation guidance.

input_schema:
  type: object
  properties:
    labels:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          value:
            type: string
    start_time:
      type: string
      description: ISO 8601 start of the time window (e.g. 2024-01-01T00:00:00Z)
    end_time:
      type: string
      description: ISO 8601 end of the time window (e.g. 2024-01-01T01:00:00Z)
    limit:
      type: integer
      description: Maximum number of log entries to fetch (default 100)
    objective:
      type: string
      description: Optional analysis objective to focus the root-cause investigation

output_schema:
  type: object
  properties:
    original_input:
      type: object
    steps_completed:
      type: array
      items:
        type: object
        properties:
          step_id:
            type: string
          success:
            type: boolean
          output:
            type: string
          error:
            type: string
